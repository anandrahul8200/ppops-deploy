name: 'Kiro PR Code Review'

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  kiro-review:
    name: 'Kiro AI Code Review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Get changed files
        id: changes
        run: |
          FILES=$(git diff --name-only origin/main...HEAD -- '*.cs' '*.csproj' '*.json' | head -20)
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Changed files:"
          echo "$FILES"

      - name: Save diff to file
        if: steps.changes.outputs.files != ''
        run: |
          git diff origin/main...HEAD -- '*.cs' '*.csproj' '*.json' > /tmp/pr-diff.txt
          echo "Diff size: $(wc -c < /tmp/pr-diff.txt) bytes"

      - name: Run Kiro code review
        if: steps.changes.outputs.files != ''
        id: review
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat /tmp/pr-diff.txt)
          REVIEW=$(kiro-cli chat \
            --no-interactive \
            --trust-tools=read,grep,glob,code \
            "You are a senior .NET/C# code reviewer reviewing a pull request. Analyze the following code diff thoroughly.

          OUTPUT FORMAT RULES (STRICT - follow exactly):
          - Output ONLY plain text and GitHub-flavored markdown. NO ANSI escape codes, NO terminal colors, NO special characters.
          - Use markdown code blocks with \`\`\`csharp for code snippets.
          - Use markdown headers (##, ###) for sections.
          - Use markdown tables for the summary.

          For EACH finding, provide ALL of the following:
          1. Severity badge: use 🔴 for Critical, 🟡 for Warning, 🟢 for Suggestion
          2. Title with file name and line number(s)
          3. PROBLEMATIC CODE: Show the exact bad code in a csharp code block
          4. EXPLANATION: Why this is a problem (security risk, crash scenario, performance impact)
          5. FIXED CODE: Show the corrected code in a csharp code block
          6. STEPS TO FIX: Numbered steps the developer should take

          At the end, include:
          - A markdown summary table with columns: Severity, Count, Key Issues
          - A final verdict line: either RESULT:PASS (no critical issues) or RESULT:FAIL (has critical issues)

          Here is the diff to review:

          $DIFF_CONTENT" 2>&1)

          # Strip ANSI escape codes from output
          CLEAN_REVIEW=$(echo "$REVIEW" | sed 's/\x1b\[[0-9;]*[a-zA-Z]//g' | sed 's/\x1b\[?[0-9]*[a-zA-Z]//g' | sed 's/\x1b\[[0-9]*[A-Z]//g')
          echo "$CLEAN_REVIEW"
          {
            echo "review<<ENDOFREVIEW"
            echo "$CLEAN_REVIEW"
            echo "ENDOFREVIEW"
          } >> $GITHUB_OUTPUT

      - name: Post review as PR comment
        if: steps.review.outputs.review != ''
        uses: actions/github-script@v7
        with:
          script: |
            const review = process.env.REVIEW_OUTPUT;
            const body = `## 🤖 Kiro AI Code Review\n\n${review}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          REVIEW_OUTPUT: ${{ steps.review.outputs.review }}

      - name: Fail if critical issues found
        if: steps.review.outputs.review != ''
        run: |
          REVIEW='${{ steps.review.outputs.review }}'
          if echo "$REVIEW" | grep -qi "RESULT:FAIL"; then
            echo ""
            echo "============================================"
            echo "❌ KIRO CODE REVIEW: FAILED"
            echo "============================================"
            echo ""
            echo "Critical issues were found in this PR."
            echo "Please review the Kiro AI Code Review comment"
            echo "on the PR for detailed findings, problematic"
            echo "code sections, and fix instructions."
            echo ""
            echo "PR cannot be merged until critical issues"
            echo "are resolved."
            echo "============================================"
            exit 1
          elif echo "$REVIEW" | grep -qi "critical"; then
            echo ""
            echo "============================================"
            echo "❌ KIRO CODE REVIEW: FAILED"
            echo "============================================"
            echo ""
            echo "Critical issues were found in this PR."
            echo "See the PR comment for details and fixes."
            echo "============================================"
            exit 1
          else
            echo ""
            echo "============================================"
            echo "✅ KIRO CODE REVIEW: PASSED"
            echo "============================================"
            echo ""
            echo "No critical issues found."
            echo "Warnings and suggestions are in the PR comment."
            echo "============================================"
          fi
