name: 'Kiro PR Code Review'

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  kiro-review:
    name: 'Kiro AI Code Review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Get changed files
        id: changes
        run: |
          FILES=$(git diff --name-only origin/main...HEAD -- '*.cs' '*.csproj' '*.json' | head -20)
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Changed files:"
          echo "$FILES"

      - name: Run Kiro code review
        if: steps.changes.outputs.files != ''
        id: review
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
        run: |
          DIFF=$(git diff origin/main...HEAD -- '*.cs' '*.csproj' '*.json')
          REVIEW=$(echo "$DIFF" | kiro-cli chat \
            --agent code-reviewer \
            --no-interactive \
            --trust-tools=read,grep,glob,code \
            "Review the following code changes for this pull request. Focus on bugs, security issues, performance, and .NET best practices. Provide a summary with severity levels (critical/warning/suggestion)." 2>&1)
          echo "$REVIEW"
          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post review as PR comment
        if: steps.review.outputs.review != ''
        uses: actions/github-script@v7
        with:
          script: |
            const review = `## 🤖 Kiro AI Code Review\n\n${process.env.REVIEW_OUTPUT}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: review
            });
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          REVIEW_OUTPUT: ${{ steps.review.outputs.review }}
