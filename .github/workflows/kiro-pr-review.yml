name: 'Kiro PR Code Review'

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  kiro-review:
    name: 'Kiro AI Code Review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Get changed files
        id: changes
        run: |
          FILES=$(git diff --name-only origin/main...HEAD -- '*.cs' '*.csproj' '*.json' | head -20)
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Changed files:"
          echo "$FILES"

      - name: Save diff to file
        if: steps.changes.outputs.files != ''
        run: |
          git diff origin/main...HEAD -- '*.cs' '*.csproj' '*.json' > /tmp/pr-diff.txt
          echo "Diff size: $(wc -c < /tmp/pr-diff.txt) bytes"
          cat /tmp/pr-diff.txt

      - name: Run Kiro code review
        if: steps.changes.outputs.files != ''
        id: review
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat /tmp/pr-diff.txt)
          REVIEW=$(kiro-cli chat \
            --no-interactive \
            --trust-tools=read,grep,glob,code \
            "You are a senior .NET/C# code reviewer. Review the following code diff for bugs, security vulnerabilities, performance issues, and best practices. Categorize findings by severity (critical/warning/suggestion). Here is the diff:

          $DIFF_CONTENT" 2>&1)
          echo "$REVIEW"
          {
            echo "review<<ENDOFREVIEW"
            echo "$REVIEW"
            echo "ENDOFREVIEW"
          } >> $GITHUB_OUTPUT

      - name: Post review as PR comment
        if: steps.review.outputs.review != ''
        uses: actions/github-script@v7
        with:
          script: |
            const review = process.env.REVIEW_OUTPUT;
            const body = `## 🤖 Kiro AI Code Review\n\n${review}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          REVIEW_OUTPUT: ${{ steps.review.outputs.review }}
